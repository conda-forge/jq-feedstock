{% set version = "1.8.0" %}
package:
  name: jq
  version: {{ version }}

source:
  url: https://github.com/jqlang/jq/releases/download/jq-{{ version }}/jq-{{ version }}.tar.gz
  patches:   # [linux]
    - 0001-disable-color-tests.patch  # [linux]
  sha256: 91811577f91d9a6195ff50c2bffec9b72c8429dc05ec3ea022fd95c06d2b319c

build:
  number: 0
  skip: true  # [win]

requirements:
  build:
    - gnuconfig  # [unix]
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - make
  host:
    - oniguruma 6.9.*
  run:
    - oniguruma 6.9.*

test:
  commands:
    - jq --help  # [not win]

about:
  home: https://jqlang.github.io/jq/
  license: MIT
  license_file: COPYING
  summary: A command-line JSON processor.

extra:
  recipe-maintainers:
    - jakirkham
    - '0xbe7a'
